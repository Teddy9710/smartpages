<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑器 - Smart Page Scribe</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📝 智能文档助手</h1>
      <div class="header-actions">
        <button id="btn-documents" class="btn-icon" title="文档管理">📚</button>
        <button id="btn-new" class="btn-icon" title="新建">📄</button>
      </div>
    </header>

    <!-- 文档管理面板 -->
    <div id="documents-panel" class="state-view hidden">
      <div class="panel-header">
        <h2>📚 文档管理</h2>
        <button id="btn-close-documents" class="btn-icon" title="关闭">×</button>
      </div>
      <div class="documents-content">
        <div class="upload-section">
          <h3>上传文档</h3>
          <div class="upload-area" id="sidepanel-upload-area">
            <div class="upload-content">
              <span class="upload-icon">📄</span>
              <p>拖拽文件到这里或点击选择文件</p>
              <p class="upload-help">支持格式: PDF, DOCX, TXT</p>
              <input type="file" id="sidepanel-document-file" accept=".pdf,.docx,.txt" style="display: none;">
              <button id="sidepanel-browse-btn" class="btn btn-outline">浏览文件</button>
            </div>
          </div>
          <div id="sidepanel-upload-progress" class="progress hidden">
            <div class="progress-bar">
              <div class="progress-fill" id="sidepanel-progress-fill"></div>
            </div>
            <span class="progress-text" id="sidepanel-progress-text">0%</span>
          </div>
          <div id="sidepanel-upload-result" class="upload-result hidden"></div>
        </div>

        <div class="documents-list-section">
          <h3>已上传的文档</h3>
          <div class="documents-actions">
            <input type="text" id="sidepanel-search-documents" placeholder="搜索文档..." class="input input-small">
            <button id="sidepanel-refresh-documents" class="btn btn-small btn-secondary">🔄 刷新</button>
          </div>
          <div id="sidepanel-documents-list" class="documents-list">
            <div class="loading-placeholder">正在加载文档列表...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 加载状态 -->
    <div id="loading-state" class="state-view hidden">
      <div class="loading-content">
        <div class="spinner"></div>
        <p id="loading-text">正在处理...</p>
      </div>
    </div>

    <!-- 描述选择器 -->
    <div id="description-selector" class="state-view hidden">
      <div class="selector-content">
        <h2>智能推测您可能想生成的文档：</h2>
        <div id="description-list" class="description-list">
          <!-- 动态生成的描述选项 -->
        </div>
        <div class="custom-input">
          <label>
            <input type="radio" name="description" value="custom">
            <span>或输入自定义描述：</span>
          </label>
          <textarea id="custom-description" class="textarea" placeholder="请输入您想要的文档描述..."></textarea>
        </div>
        <button id="btn-generate" class="btn btn-primary">
          <span class="icon">✨</span>
          生成文档
        </button>
      </div>
    </div>

    <!-- 文档编辑器 -->
    <div id="document-editor" class="state-view hidden">
      <div class="editor-toolbar">
        <button id="btn-preview" class="btn-tool active" title="预览模式">
          <span class="icon">👁</span> 预览
        </button>
        <button id="btn-edit" class="btn-tool" title="编辑模式">
          <span class="icon">✏</span> 编辑
        </button>
        <div class="toolbar-spacer"></div>
        <button id="btn-copy" class="btn-tool" title="复制Markdown">
          <span class="icon">📋</span> 复制
        </button>
        <button id="btn-download" class="btn-tool" title="下载文件">
          <span class="icon">💾</span> 下载
        </button>
      </div>
      <div class="editor-content">
        <div id="preview-pane" class="pane active">
          <div id="markdown-preview" class="markdown-preview"></div>
        </div>
        <div id="edit-pane" class="pane">
          <textarea id="markdown-editor" class="markdown-editor" placeholder="在此编辑Markdown内容..."></textarea>
        </div>
      </div>
    </div>

    <!-- 空状态 -->
    <div id="empty-state" class="state-view active">
      <div class="empty-content">
        <div class="empty-icon">📝</div>
        <h2>欢迎使用智能文档助手</h2>
        <p>点击浏览器工具栏中的插件图标</p>
        <p>开始录制您的操作流程</p>
        <button id="btn-start-here" class="btn btn-primary">
          <span class="icon">⏺</span>
          开始录制
        </button>
      </div>
    </div>

    <!-- 错误状态 -->
    <div id="error-state" class="state-view hidden">
      <div class="error-content">
        <div class="error-icon">⚠️</div>
        <h2>生成失败</h2>
        <p id="error-message">请检查您的API配置和网络连接</p>
        <button id="btn-retry" class="btn btn-primary">
          <span class="icon">🔄</span>
          重试
        </button>
      </div>
    </div>
  </div>

  <script src="../utils/documentUpload.js"></script>
  <script src="../utils/documentApi.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
